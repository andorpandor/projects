<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yr Hot Air Balloon - SMIL Animation</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #EDF4FF;
            font-family: 'Inter', sans-serif;
        }

        .poster {
            width: 700px;
            height: 700px;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
        }

        img {
            width: 100%;
            height: 100%;
        }

        .label {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #3D81D8;
            opacity: 0.8;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="poster">
        <!-- Displaying the SMIL animated SVG -->
        <img src="svg/Hot Air Balloon.svg" alt="Animated Hot Air Balloon">
        <div class="label">Designutforskning 3.0</div>
    </div>
</body>

</html>
