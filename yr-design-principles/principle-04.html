<!DOCTYPE html>
<html lang="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yr Designutforskning 3.0 - Designprinsipper (4: Yr er enkel)</title>
    <style>
        @font-face {
            font-family: 'NRK Sans';
            src: url('fonts/NRKSansVariable.ttf') format('truetype');
            font-weight: 100 900;
            font-style: normal;
        }

        @font-face {
            font-family: 'NRK Sans';
            src: url('fonts/NRKSans-ExtraBoldItalic.ttf') format('truetype');
            font-weight: 800;
            font-style: italic;
        }

        :root {
            /* Poster 4: Enkel */
            --bg-4: #FEF3DD;
            --text-4: #4C5610;

            --font-main: 'NRK Sans', -apple-system, sans-serif;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .poster-section {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background-color: var(--bg-4);
            color: var(--text-4);
        }

        .container {
            width: 1920px;
            height: 1080px;
            transform-origin: center;
            transform: scale(min(calc(100vw / 1920), calc(100vh / 1080)));
            display: flex;
            position: relative;
        }

        /* Logo */
        .logo-container {
            position: absolute;
            top: 70px;
            left: 70px;
            z-index: 10;
        }

        .yr-logo-svg {
            width: 100px;
            height: 100px;
        }

        /* Layout */
        .content {
            display: flex;
            width: 100%;
            height: 100%;
            align-items: center;
            padding: 0 170px;
            gap: 150px;
        }

        .illustration-side {
            width: 700px;
            height: 700px;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .illustration-side img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .text-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            max-width: 730px;
        }

        .title {
            font-size: 72px;
            font-weight: 800;
            font-style: italic;
            margin: 0 0 60px 0;
            line-height: 0.95;
            letter-spacing: -2px;
            text-box-edge: cap alphabetic;
            text-box-trim: trim-both;
        }

        .description {
            font-size: 32px;
            font-weight: 450;
            letter-spacing: -1px;
            line-height: 1.3;
            margin: 0;
        }

        p.description+p.description {
            margin-top: 60px;
        }
    </style>
</head>

<body>
    <!-- Poster 4: Yr er enkel -->
    <section class="poster-section">
        <div class="container">
            <div class="logo-container">
                <img src="svg/Logo.svg" alt="Yr Logo" class="yr-logo-svg">
            </div>
            <div class="content">
                <div class="illustration-side">
                    <img src="svg/atom.svg" alt="Yr Atom Illustration">
                </div>
                <div class="text-side">
                    <h1 class="title">Yr er enkel</h1>
                    <p class="description">
                        Vi reduserer kompleksiteten i tjenesten ved å velge etablerte mønstre og konvensjoner for
                        informasjonsdesign og interaksjon.
                    </p>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
